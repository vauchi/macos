include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/timeouts.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'

variables:
  SAST_EXCLUDED_PATHS: "build/, DerivedData/, .spm-packages/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, DerivedData/, .spm-packages/"
  SAST_ANALYZER_IMAGE_TAG: "5"

stages:
  - update
  - lint
  - build
  - test
  - security
  - deploy

workflow:
  auto_cancel:
    on_new_commit: interruptible

# Interruptible default for auto-cancel
default:
  interruptible: true

.macos-job:
  tags:
    - macos
    - self-hosted
  # Serialize all SPM-using jobs on the shared macOS runner.
  # Multiple concurrent xcodebuild -resolvePackageDependencies deadlock
  # on SPM's global package cache (~/.cache/org.swift.swiftpm/).
  # Runner concurrent=1 is the primary fix; this is defense-in-depth.
  resource_group: macos-spm
  before_script:
    - echo "Xcode $(xcodebuild -version | head -1)"
    # Self-healing: remove stale keychain entries for gitlab.com.
    # Duplicate/locked entries cause SPM binary target downloads to
    # crash with "fatalError" (post-mortem 2026-03-28).
    - security delete-internet-password -s gitlab.com 2>/dev/null || true

# Cache SPM packages between pipeline runs.
.spm-cache:
  cache:
    key: macos-spm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - macos-spm-${CI_DEFAULT_BRANCH}
      - macos-spm
    paths:
      - .spm-packages/
    policy: pull-push

# Read-only SPM cache for jobs that don't need to update it
.spm-cache-readonly:
  cache:
    key: macos-spm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - macos-spm-${CI_DEFAULT_BRANCH}
      - macos-spm
    paths:
      - .spm-packages/
    policy: pull

# ============================================================
# Update Stage (triggered by upstream vauchi-platform-swift release)
# ============================================================

update:bindings-version:
  stage: update
  tags:
    - macos
    - self-hosted
  resource_group: bindings-version-update
  rules:
    - if: ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "api") && $BINDINGS_VERSION
  script:
    - |
      # Strip v prefix if present (upstream trigger passes v0.1.16 format)
      BINDINGS_VERSION="${BINDINGS_VERSION#v}"
      echo "Bumping vauchi-platform-swift to $BINDINGS_VERSION"

      BRANCH="chore/bump-vauchi-platform-${BINDINGS_VERSION}"

      # Configure git — use PROJECT_ACCESS_TOKEN for push (CI_JOB_TOKEN from
      # upstream triggers lacks write access to this repo).
      # PROJECT_ACCESS_TOKEN is set at group level in Settings > CI/CD > Variables.
      git config user.email "${GITLAB_USER_EMAIL}"
      git config user.name "${GITLAB_USER_NAME}"
      git remote set-url origin "https://vauchi-gitlab-runner:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"

      # Check if branch already exists on remote
      if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "Branch $BRANCH already exists — version bump already in progress"
        exit 0
      fi

      # Create branch and update version in project.yml
      git checkout -b "$BRANCH"
      # Update VauchiPlatform dependency: branch: main → from: "version"
      # or from: "old_version" → from: "new_version"
      LINE=$(grep -n "vauchi-platform-swift" project.yml | head -1 | cut -d: -f1)
      NEXT=$((LINE + 1))
      CURRENT=$(sed -n "${NEXT}p" project.yml)
      if echo "$CURRENT" | grep -q 'branch:'; then
        sed -i "" "${NEXT}s/branch: .*/from: \"${BINDINGS_VERSION}\"/" project.yml
      else
        sed -i "" "${NEXT}s/from: \"[^\"]*\"/from: \"${BINDINGS_VERSION}\"/" project.yml
      fi

      # Verify the change was made
      if ! grep -q "from: \"${BINDINGS_VERSION}\"" project.yml; then
        echo "ERROR: Version replacement failed"
        exit 1
      fi

      # Regenerate Xcode project
      command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
      xcodegen generate

      git add project.yml Vauchi.xcodeproj/
      git commit -m "chore: Bump vauchi-platform-swift to $BINDINGS_VERSION"
      git push -u origin "$BRANCH"

      # Create MR via GitLab API
      MR_RESPONSE=$(curl -s --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"$BRANCH\",
          \"target_branch\": \"main\",
          \"title\": \"chore: Bump vauchi-platform-swift to $BINDINGS_VERSION\",
          \"description\": \"Automated version bump triggered by vauchi-platform-swift release.\\n\\nUpdates VauchiPlatform SPM minimum version to \`$BINDINGS_VERSION\`.\\n\\n---\\n_This MR was created automatically by CI._\",
          \"remove_source_branch\": true
        }" \
        "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/merge_requests")

      MR_IID=$(echo "$MR_RESPONSE" | jq -r '.iid // empty')
      MR_URL=$(echo "$MR_RESPONSE" | jq -r '.web_url // empty')
      if [ -n "$MR_URL" ] && [ -n "$MR_IID" ]; then
        echo "Created MR: $MR_URL"

        # Enable auto-merge so the MR merges automatically when CI passes
        echo "Enabling auto-merge..."
        MERGE_RESPONSE=$(curl -s --request PUT \
          --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
          "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}/merge?merge_when_pipeline_succeeds=true")
        MERGE_STATUS=$(echo "$MERGE_RESPONSE" | jq -r '.merge_when_pipeline_succeeds // empty')
        if [ "$MERGE_STATUS" = "true" ]; then
          echo "Auto-merge enabled — MR will merge when pipeline succeeds"
        else
          echo "WARNING: Could not enable auto-merge (may require maintainer token)"
          echo "  Response: $(echo "$MERGE_RESPONSE" | jq -r '.message // .error // "unknown"')"
        fi
      else
        echo "MR creation response: $MR_RESPONSE"
        echo "WARNING: Could not create MR (may already exist)"
      fi

# ============================================================
# Lint Stage (MR only)
# ============================================================

lint:swiftlint:
  stage: lint
  script:
    - swiftlint lint --strict
  tags:
    - macos
    - self-hosted
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

check:snapshot-recording:
  stage: lint
  tags:
    - macos
    - self-hosted
  script:
    - |
      MISSING=""
      for f in VauchiSnapshotTests/*.swift; do
        if grep -q 'var isRecording' "$f" && ! grep -q 'SNAPSHOT_TESTING_RECORD' "$f"; then
          MISSING="$MISSING $f"
        fi
      done
      if [ -n "$MISSING" ]; then
        echo "ERROR: isRecording property must use SNAPSHOT_TESTING_RECORD env var in:$MISSING"
        exit 1
      fi
      echo "OK: all isRecording properties use SNAPSHOT_TESTING_RECORD env var"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "VauchiSnapshotTests/**"

# ============================================================
# Build Stage
# ============================================================

build:debug:
  extends: [.macos-job, .spm-cache, .timeout-extended]
  stage: build
  script:
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - rm -rf Vauchi.xcodeproj
    # Delete lock files so SPM re-resolves to latest versions.
    # The cached bare repos in .spm-packages/ stay warm — only resolution reruns.
    - rm -f .spm-packages/workspace-state.json
    - rm -rf .spm-packages/artifacts/
    - rm -f Vauchi.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
    - xcodegen generate
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -clonedSourcePackagesDirPath .spm-packages -resolvePackageDependencies
    # TEMPORARY: Fix macOS framework symlinks broken by zip -r in v0.3.0 XCFramework.
    # Remove after core publishes with zip -ry (v0.3.1+). See core !259.
    - ./scripts/fix-xcframework-symlinks.sh
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination "platform=macOS" -clonedSourcePackagesDirPath .spm-packages CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Test Stage
# ============================================================

test:unit:
  extends: [.macos-job, .spm-cache-readonly]
  stage: test
  needs:
    - build:debug
  script:
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - rm -rf Vauchi.xcodeproj
    - rm -f .spm-packages/workspace-state.json
    - xcodegen generate
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -clonedSourcePackagesDirPath .spm-packages -resolvePackageDependencies
    # TEMPORARY: same workaround as build:debug — jobs don't share DerivedData
    - ./scripts/fix-xcframework-symlinks.sh
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -destination "platform=macOS" -clonedSourcePackagesDirPath .spm-packages CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO ENABLE_HARDENED_RUNTIME=NO build-for-testing
    - rm -rf TestResults
    # xcodebuild exit 65 can be a false positive from logarchive errors (error 13,
    # "failed to read version.plist"). Capture exit code and check actual test results.
    - |
      set +e
      xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -destination "platform=macOS" \
        -only-testing:VauchiTests -resultBundlePath TestResults test-without-building
      XCODE_EXIT=$?
      set -e
    - command -v xcresultparser >/dev/null 2>&1 || brew install a7ex/homebrew-formulae/xcresultparser
    - xcresultparser --output-format junit TestResults > test-results.xml || true
    # Evaluate actual test results from xcresult, not xcodebuild exit code
    - |
      if [ -f test-results.xml ]; then
        FAILURES=$(grep -c 'failures="[1-9]' test-results.xml || true)
        ERRORS=$(grep -c 'errors="[1-9]' test-results.xml || true)
        if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
          echo "❌ Tests failed (${FAILURES} failure suites, ${ERRORS} error suites)"
          exit 1
        fi
        echo "✅ All tests passed (xcodebuild exit ${XCODE_EXIT} was logarchive noise)"
      elif [ "$XCODE_EXIT" -ne 0 ]; then
        echo "❌ Tests failed and no results produced (exit code ${XCODE_EXIT})"
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - TestResults
    reports:
      junit: test-results.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:snapshots:
  extends: [.macos-job, .spm-cache-readonly]
  stage: test
  needs:
    - build:debug
  # Enforced — snapshot flakes must be investigated, not ignored
  script:
    - |
      BASELINE_COUNT=0
      if [ -d VauchiSnapshotTests/__Snapshots__ ]; then
        BASELINE_COUNT=$(find VauchiSnapshotTests/__Snapshots__ -name '*.png' | wc -l | tr -d ' ')
      fi
      echo "Snapshot baselines found: ${BASELINE_COUNT}"
      if [ "${BASELINE_COUNT}" -eq 0 ]; then
        echo ""
        echo "=========================================="
        echo "  BASELINES MISSING — advisory skip"
        echo "=========================================="
        echo "No committed PNG baselines in VauchiSnapshotTests/__Snapshots__/"
        echo ""
        echo "Use the 'Record baselines' manual job in this pipeline to generate them."
        echo "CI is the single source of truth — do not record locally."
        exit 0
      fi
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - rm -rf Vauchi.xcodeproj
    - rm -f .spm-packages/workspace-state.json
    - xcodegen generate
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -clonedSourcePackagesDirPath .spm-packages -resolvePackageDependencies
    - ./scripts/fix-xcframework-symlinks.sh
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -destination "platform=macOS" -clonedSourcePackagesDirPath .spm-packages CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO ENABLE_HARDENED_RUNTIME=NO build-for-testing
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -destination "platform=macOS" -only-testing:VauchiSnapshotTests -resultBundlePath SnapshotTestResults test-without-building
  artifacts:
    when: on_failure
    paths:
      - SnapshotTestResults
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# Manual job: record snapshot baselines on CI and commit them to the branch.
# CI is the single source of truth for baselines — never record locally.
test:snapshots:record:
  extends: [.macos-job, .spm-cache-readonly]
  stage: test
  needs:
    - job: build:debug
      artifacts: false  # record job does its own full build
  when: manual
  allow_failure: true
  script:
    - echo "📸 Recording snapshot baselines..."
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - rm -rf Vauchi.xcodeproj
    - rm -f .spm-packages/workspace-state.json
    - xcodegen generate
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -clonedSourcePackagesDirPath .spm-packages -resolvePackageDependencies
    - ./scripts/fix-xcframework-symlinks.sh
    # SNAPSHOT_RECORD compilation condition forces isRecording=true in test binary.
    - |
      set +e
      xcodebuild -project Vauchi.xcodeproj -scheme Vauchi \
        -destination "platform=macOS" \
        -clonedSourcePackagesDirPath .spm-packages \
        CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO ENABLE_HARDENED_RUNTIME=NO \
        SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) SNAPSHOT_RECORD' \
        test -only-testing:VauchiSnapshotTests \
        2>&1 | tee /tmp/xcodebuild-record.log
      XCODE_EXIT=$?
      set -e
      if ! grep -q "Executed.*test" /tmp/xcodebuild-record.log; then
        echo "❌ Tests never executed — infrastructure failure"
        tail -20 /tmp/xcodebuild-record.log
        exit 1
      fi
      echo "✅ Tests executed (exit code ${XCODE_EXIT} is expected in record mode)"
    # Preserve recorded snapshots across git checkout
    - cp -r VauchiSnapshotTests/__Snapshots__/ /tmp/__Snapshots__/
    # Switch from detached merge-ref HEAD to the actual branch.
    # CI_JOB_TOKEN auth is auto-configured by GitLab (insteadOf rewrite).
    # Push permissions enabled via project setting (ci_push_repository_for_job_token_allowed).
    - git config user.name "${GITLAB_USER_NAME}"
    - git config user.email "${GITLAB_USER_EMAIL}"
    - git fetch origin "+refs/heads/${CI_COMMIT_REF_NAME}:refs/heads/${CI_COMMIT_REF_NAME}"
    - git checkout "${CI_COMMIT_REF_NAME}"
    # Restore recorded snapshots (git checkout resets working directory)
    - cp -r /tmp/__Snapshots__/ VauchiSnapshotTests/__Snapshots__/
    # Commit and push baselines (skip if unchanged)
    - |
      git add VauchiSnapshotTests/__Snapshots__/
      if git diff --cached --quiet; then
        echo "✅ No baseline changes — nothing to commit"
        exit 0
      fi
      CHANGED=$(git diff --cached --stat | tail -1)
      git commit -m "chore: record snapshot baselines [ci]

      ${CHANGED}

      Recorded-By: CI job #${CI_JOB_ID}"
      git push origin HEAD:${CI_COMMIT_REF_NAME}
      echo "✅ Baselines committed and pushed"
      echo "   NOTE: CI_JOB_TOKEN pushes do not trigger pipelines."
      echo "   Push any change or run 'glab ci create' to validate baselines."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.swift"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Swift-specific security analysis (mirrors ios/ security:swift-analysis)
security:swift-analysis:
  extends: .timeout-quick
  stage: security
  tags:
    - macos
    - self-hosted
  script:
    - 'grep -r "NSAllowsArbitraryLoads" . && echo "WARNING: App Transport Security disabled" || true'
    - 'grep -r "allowsBackup.*true" . && echo "WARNING: Backup enabled" || true'
    - 'grep -r "NSCameraUsageDescription\|NSPhotoLibraryUsageDescription\|NSLocationWhenInUseUsageDescription" Info.plist || echo "INFO: No privacy permissions declared"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.plist"
          - ".gitlab-ci.yml"

# Dependency check for SPM (runs on dependency changes)
security:dependencies:
  extends: .timeout-quick
  stage: security
  tags:
    - macos
    - self-hosted
  script:
    - |
      if [ -f "Package.resolved" ]; then
        echo "Checking Swift Package dependencies..."
        swift package show-dependencies || true
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "project.yml"
          - "Package.resolved"
          - ".gitlab-ci.yml"

# ============================================================
# Design Drift Check
# ============================================================

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "Vauchi/CoreUI/Components"
    DESIGN_DRIFT_FILE_EXT: ".swift"
    DESIGN_DRIFT_CASE: "pascal"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "Vauchi/"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
