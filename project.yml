name: Vauchi
options:
  bundleIdPrefix: app.vauchi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  VauchiPlatform:
    path: ../vauchi-platform-swift
    # ADR-044 Am2a: local path override so xcodebuild consumes the
    # feature-branch checkout in the same workspace. Revert to a remote
    # branch/version pin once vauchi-platform-swift!81 is merged and tagged.
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Vauchi:
    type: application
    platform: macOS
    sources:
      - path: Vauchi
        excludes:
          - "**/*.xcassets"
          - "Libs"
          - "Generated"
    dependencies:
      - package: VauchiPlatform
        product: VauchiPlatform
      - package: VauchiPlatform
        product: VauchiHardware
      - package: VauchiPlatform
        product: CoreUIModels
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Vauchi/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
    info:
      path: Vauchi/Info.plist
      properties:
        CFBundleDisplayName: Vauchi
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.social-networking
        NSCameraUsageDescription: Vauchi uses the camera to scan QR codes during contact exchange.
        NSMicrophoneUsageDescription: Vauchi uses the microphone for ultrasonic proximity verification during contact exchange.
        NSLocationWhenInUseUsageDescription: Vauchi can record where you met a contact during an in-person exchange. This is stored privately on your device and never shared.

  VauchiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VauchiTests
    dependencies:
      - target: Vauchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos.tests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

  VauchiSnapshotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VauchiSnapshotTests
    dependencies:
      - target: Vauchi
      - package: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos.snapshottests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

  VauchiUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: VauchiUITests
    dependencies:
      - target: Vauchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos.uitests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Vauchi:
    build:
      targets:
        Vauchi: all
        VauchiTests: [test]
        VauchiSnapshotTests: [test]
        VauchiUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VauchiTests
        - VauchiSnapshotTests
        - VauchiUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

# vauchi-platform-swift bumped 0.51.46 -> 0.51.47 (2026-06-08): the 0.51.46
# tag was force-moved upstream (old commit 85d5aebb GC.d) and the runner SPM
# mirror kept serving the dead commit, breaking package resolution in CI
# (build:debug resolved but test:snapshots did not). v0.51.47 (dc6d11b8) is a
# fresh tag with no poisoned mirror entry. See problem record
# 2026-05-08-nell-runner-spm-mirror-corruption.
#
# 0.51.47 -> 0.51.48 (2026-06-08): adds CommandDTO.locationRequest for the
# ADR-051 capture-at-exchange "where we met" annotation (handled by
# LocationService via CLLocationManager).
