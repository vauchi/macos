name: Vauchi
options:
  bundleIdPrefix: app.vauchi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  VauchiPlatform:
    url: https://gitlab.com/vauchi/vauchi-platform-swift.git
    version: "0.39.0"
    # CI mirror script (.gitlab-ci.yml ~line 329) extracts this version
    # via `sed -n '/vauchi-platform-swift/{n;s/.*"\([^"]*\)".*/\1/p;}'`
    # — it advances past the URL line and reads the FIRST quoted string
    # on the next line. Keep the `version:` line immediately after the
    # URL with no comment in between, otherwise sed picks up a quoted
    # token from the comment instead and the runner builds the wrong
    # mirror dir. Use exact-version pin (not `from:`) to match
    # ios/project.yml and prevent SPM from re-resolving to a different
    # version when Package.resolved is missing in fresh CI checkouts.
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Vauchi:
    type: application
    platform: macOS
    sources:
      - path: Vauchi
        excludes:
          - "**/*.xcassets"
          - "Libs"
          - "Generated"
    dependencies:
      - package: VauchiPlatform
        product: VauchiPlatform
      - package: VauchiPlatform
        product: CoreUIModels
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Vauchi/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
    info:
      path: Vauchi/Info.plist
      properties:
        CFBundleDisplayName: Vauchi
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.social-networking
        NSCameraUsageDescription: Vauchi uses the camera to scan QR codes during contact exchange.
        NSMicrophoneUsageDescription: Vauchi uses the microphone for ultrasonic proximity verification during contact exchange.

  VauchiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VauchiTests
    dependencies:
      - target: Vauchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos.tests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

  VauchiSnapshotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VauchiSnapshotTests
    dependencies:
      - target: Vauchi
      - package: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos.snapshottests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

  VauchiUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: VauchiUITests
    dependencies:
      - target: Vauchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.macos.uitests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Vauchi:
    build:
      targets:
        Vauchi: all
        VauchiTests: [test]
        VauchiSnapshotTests: [test]
        VauchiUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VauchiTests
        - VauchiSnapshotTests
        - VauchiUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
